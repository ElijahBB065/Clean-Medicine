<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  gtag('config', 'G-PZNDGF0TGE');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Medicine Safety Guide</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Fixes the flexbox issue and forces the counter to the very bottom center */
    footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="bg-decorations">
    <div class="floating-emoji emoji-1">💊</div>
    <div class="floating-emoji emoji-2">🩺</div>
    <div class="floating-emoji emoji-3">🩹</div>
    <div class="floating-emoji emoji-4">🧬</div>
    <div class="floating-emoji emoji-5">🧪</div>
    <div class="floating-emoji emoji-6">🏥</div>
  </div>

  <div class="card">
    
    <div id="welcome-screen" class="screen active text-center">
      <div class="hero-graphics">
        <span class="sparkle-icon">✨</span>
        <span class="main-pill">💊</span>
        <span class="sparkle-icon">✨</span>
      </div>
      <h1>Medicine Safety Check</h1>
      <p class="subtitle">Instantly analyze clinical data, dietary restrictions, and potential allergen alerts before administering common treatments.</p>
      <button id="start-btn" class="btn-primary">Launch Database</button>
    </div>

    <div id="selection-screen" class="screen text-center">
      <button id="back-to-welcome" class="btn-secondary">← Back to Welcome</button>
      <h2>Select a Medication</h2>
      <p class="instruction-text">Pick a prescription or over-the-counter medication below to view critical healthcare parameters.</p>
      
      <div class="select-container">
        <select id="med-select">
          <option value="" disabled selected hidden>Choose an option...</option>
        </select>
      </div>
    </div>

    <div id="report-screen" class="screen">
      <button id="back-to-select" class="btn-secondary">← Search Another Medication</button>
      <div id="dashboard"></div>
    </div>

  </div>

  <footer>
    <img src="https://hitscounter.dev/YOUR_GITHUB_USERNAME/YOUR_REPOSITORY_NAME" alt="Visits Tracker">
  </footer>

  <script src="script.js"></script>
</body>
</html>
